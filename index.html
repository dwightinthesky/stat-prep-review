<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST11 Statistics — Final Exam Review</title>
<meta name="description" content="Interactive ST11 Statistics final exam review — Claude-style design">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   CLAUDE-STYLE DESIGN SYSTEM
   Warm, clean, minimal, premium
   ═══════════════════════════════════════════════════ */
:root {
  --bg-page: #F9F5EE;
  --bg-white: #FFFFFF;
  --bg-warm: #F5F0E8;
  --bg-warm-hover: #EDE8DF;
  --bg-input: #FAF8F5;
  --border: #E5DDD0;
  --border-light: #EDE8DF;
  --border-focus: #D97706;
  --text-primary: #1C160C;
  --text-secondary: #6B6255;
  --text-muted: #9B9285;
  --text-placeholder: #B5AEA3;
  --accent: #D97706;
  --accent-hover: #B45309;
  --accent-bg: #FEF3C7;
  --accent-border: #FCD34D;
  --green: #059669;
  --green-bg: #D1FAE5;
  --green-border: #6EE7B7;
  --red: #DC2626;
  --red-bg: #FEE2E2;
  --red-border: #FCA5A5;
  --blue: #2563EB;
  --blue-bg: #DBEAFE;
  --blue-border: #93C5FD;
  --purple: #7C3AED;
  --purple-bg: #EDE9FE;
  --purple-border: #C4B5FD;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
  --transition: all 0.2s ease;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg-page);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ─── TOP BAR ─── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px;
  background: var(--bg-white);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 30px;
  height: 30px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 800;
  color: white;
}

.logo-text {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text-primary);
}

.logo-sub {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-left: 4px;
  font-weight: 400;
}

/* Timer */
.timer-widget {
  display: flex;
  align-items: center;
  gap: 8px;
}

.timer-display {
  font-family: var(--mono);
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--text-primary);
  background: var(--bg-warm);
  padding: 5px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  min-width: 100px;
  text-align: center;
  letter-spacing: 1.5px;
}

.timer-btn {
  background: var(--bg-white);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 5px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.78rem;
  font-weight: 500;
  transition: var(--transition);
}
.timer-btn:hover {
  background: var(--bg-warm);
  border-color: var(--accent);
  color: var(--text-primary);
}
.timer-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

/* Top controls */
.top-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.calc-toggle {
  background: var(--bg-white);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.78rem;
  font-weight: 600;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.calc-toggle:hover {
  background: var(--bg-warm);
  border-color: var(--accent);
  color: var(--accent);
}

.submit-btn {
  background: var(--accent);
  border: none;
  color: white;
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.78rem;
  font-weight: 600;
  transition: var(--transition);
}
.submit-btn:hover {
  background: var(--accent-hover);
  box-shadow: var(--shadow-md);
}
.submit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ─── MAIN AREA ─── */
.main-area { display: flex; flex: 1; }

.content-area {
  flex: 1;
  padding: 24px;
  max-width: 900px;
  margin: 0 auto;
  transition: var(--transition);
}
.content-area.calc-open { margin-right: 360px; max-width: 100%; }

/* ─── TABS ─── */
.tab-bar {
  display: flex;
  gap: 0;
  margin-bottom: 20px;
  background: var(--bg-white);
  padding: 4px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  width: fit-content;
  box-shadow: var(--shadow-sm);
}

.tab-btn {
  padding: 8px 20px;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.tab-btn:hover { color: var(--text-primary); background: var(--bg-warm); }

.tab-btn.active {
  background: var(--accent);
  color: white;
  box-shadow: var(--shadow-sm);
}

.tab-badge {
  display: inline-block;
  background: rgba(255,255,255,0.3);
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 0.68rem;
  margin-left: 4px;
  font-weight: 500;
}

.tab-btn:not(.active) .tab-badge {
  background: var(--bg-warm);
  color: var(--text-muted);
}

/* ─── PROGRESS ─── */
.progress-bar-container { margin-bottom: 24px; }

.progress-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 0.72rem;
  color: var(--text-muted);
  font-weight: 500;
}

.progress-track {
  width: 100%;
  height: 4px;
  background: var(--border-light);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* ─── TOPIC GROUP ─── */
.topic-group {
  margin-bottom: 32px;
}

.topic-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-light);
}

.topic-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

.topic-name {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.3px;
}

.topic-count {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-left: auto;
}

/* ─── QUESTION CARD ─── */
.questions-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.question-card {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  transition: var(--transition);
  position: relative;
  box-shadow: var(--shadow-sm);
}

.question-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow);
}

.question-card.answered {
  border-left: 3px solid var(--green);
}
.question-card.incorrect {
  border-left: 3px solid var(--red);
}

.question-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.q-number {
  background: var(--accent-bg);
  color: var(--accent);
  font-weight: 700;
  font-size: 0.78rem;
  padding: 3px 10px;
  border-radius: 16px;
  white-space: nowrap;
  border: 1px solid var(--accent-border);
}

.q-type {
  font-size: 0.7rem;
  color: var(--text-muted);
  background: var(--bg-warm);
  padding: 3px 8px;
  border-radius: 10px;
}

.q-status {
  margin-left: auto;
  font-size: 0.72rem;
  font-weight: 600;
}
.q-status.correct { color: var(--green); }
.q-status.incorrect { color: var(--red); }

.question-text {
  font-size: 0.92rem;
  line-height: 1.75;
  color: var(--text-primary);
  margin-bottom: 14px;
  white-space: pre-wrap;
}

/* Sub-questions */
.sub-questions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 6px;
}

.sub-q {
  background: var(--bg-input);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}

.sub-q-label {
  font-weight: 600;
  color: var(--accent);
  font-size: 0.78rem;
  margin-bottom: 4px;
}

.sub-q-text {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 8px;
}

/* Answer input */
.answer-input {
  width: 100%;
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 0.85rem;
  padding: 8px 12px;
  outline: none;
  transition: var(--transition);
  resize: vertical;
  min-height: 38px;
}
.answer-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(217,119,6,0.1);
}
.answer-input::placeholder { color: var(--text-placeholder); }

/* MC Options */
.mc-options {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 6px;
}

.mc-option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  font-size: 0.85rem;
  line-height: 1.5;
}
.mc-option:hover {
  background: var(--bg-warm-hover);
  border-color: var(--accent);
}
.mc-option.selected {
  background: var(--accent-bg);
  border-color: var(--accent-border);
}
.mc-option.correct-answer {
  background: var(--green-bg);
  border-color: var(--green-border);
}
.mc-option.wrong-answer {
  background: var(--red-bg);
  border-color: var(--red-border);
}

.mc-radio {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid var(--border);
  transition: var(--transition);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
}
.mc-option.selected .mc-radio {
  border-color: var(--accent);
}
.mc-option.selected .mc-radio::after {
  content: '';
  width: 7px;
  height: 7px;
  background: var(--accent);
  border-radius: 50%;
}

/* Action buttons row */
.action-row {
  display: flex;
  gap: 6px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.show-answer-btn {
  background: var(--bg-white);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.75rem;
  font-weight: 500;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 5px;
}
.show-answer-btn:hover {
  background: var(--bg-warm);
  border-color: var(--accent);
  color: var(--accent);
}

.cheatsheet-toggle {
  background: var(--bg-white);
  border: 1px solid var(--purple-border);
  color: var(--purple);
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.75rem;
  font-weight: 500;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 5px;
}
.cheatsheet-toggle:hover {
  background: var(--purple-bg);
}

/* Solution Panel */
.solution-panel {
  display: none;
  margin-top: 12px;
  background: var(--green-bg);
  border: 1px solid var(--green-border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  animation: slideDown 0.25s ease;
}
.solution-panel.visible { display: block; }

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

.solution-title {
  font-weight: 700;
  color: var(--green);
  font-size: 0.78rem;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.solution-content {
  font-size: 0.83rem;
  color: var(--text-primary);
  line-height: 1.75;
  white-space: pre-wrap;
}

/* Cheatsheet Panel */
.cheatsheet-panel {
  display: none;
  margin-top: 8px;
  background: var(--purple-bg);
  border: 1px solid var(--purple-border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  animation: slideDown 0.25s ease;
}
.cheatsheet-panel.visible { display: block; }

.cheatsheet-title {
  font-weight: 700;
  color: var(--purple);
  font-size: 0.76rem;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.cheatsheet-content {
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.7;
  white-space: pre-wrap;
  font-family: var(--mono);
  font-size: 0.76rem;
}

/* ─── CALCULATOR SIDEBAR ─── */
.calculator-sidebar {
  position: fixed;
  right: -380px;
  top: 0;
  width: 360px;
  height: 100vh;
  background: var(--bg-white);
  border-left: 1px solid var(--border);
  z-index: 150;
  transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
  display: flex;
  flex-direction: column;
  box-shadow: -4px 0 20px rgba(0,0,0,0.06);
}
.calculator-sidebar.open { right: 0; }

.calc-sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-warm);
}

.calc-sidebar-title {
  font-weight: 700;
  font-size: 0.82rem;
  color: var(--text-primary);
}

.calc-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 1.1rem;
  transition: var(--transition);
  padding: 4px;
  line-height: 1;
}
.calc-close:hover { color: var(--red); }

.calc-iframe-container {
  flex: 1;
  overflow: hidden;
}
.calc-iframe-container iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* ─── RESULTS MODAL ─── */
.results-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(28,22,12,0.4);
  backdrop-filter: blur(6px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.25s ease;
}
.results-overlay.visible { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.results-card {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
  max-width: 560px;
  width: 92%;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: scaleIn 0.3s cubic-bezier(0.4,0,0.2,1);
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.results-header { text-align: center; margin-bottom: 24px; }

.results-score {
  font-size: 3.5rem;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
}

.results-subtitle {
  color: var(--text-secondary);
  font-size: 0.85rem;
  margin-top: 6px;
}

.results-grade {
  display: inline-block;
  padding: 4px 16px;
  border-radius: 16px;
  font-weight: 700;
  font-size: 0.9rem;
  margin-top: 10px;
}

.grade-excellent { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.grade-good { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
.grade-fair { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }
.grade-poor { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

.results-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.stat-box {
  background: var(--bg-warm);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
}
.stat-value {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--text-primary);
}
.stat-label {
  font-size: 0.68rem;
  color: var(--text-muted);
  margin-top: 2px;
  font-weight: 500;
}

.topic-results { margin-top: 16px; }
.topic-result-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-light);
}
.topic-result-row:last-child { border-bottom: none; }
.topic-result-name {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-primary);
  min-width: 140px;
}
.topic-result-bar {
  flex: 1;
  height: 6px;
  background: var(--border-light);
  border-radius: 3px;
  overflow: hidden;
}
.topic-result-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.topic-result-score {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-secondary);
  min-width: 36px;
  text-align: right;
}

.results-close-btn {
  display: block;
  width: 100%;
  margin-top: 16px;
  background: var(--accent);
  border: none;
  color: white;
  padding: 10px;
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.results-close-btn:hover {
  background: var(--accent-hover);
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ─── Responsive ─── */
@media (max-width: 768px) {
  .top-bar { padding: 8px 12px; flex-wrap: wrap; gap: 6px; }
  .content-area { padding: 16px 12px; }
  .logo-sub { display: none; }
  .timer-display { font-size: 1rem; min-width: 80px; }
}
</style>
</head>
<body>

<div class="app-container">
  <!-- Top Bar -->
  <header class="top-bar">
    <div class="logo">
      <div class="logo-icon">ST</div>
      <span class="logo-text">ST11 Stats Review</span>
      <span class="logo-sub">Final Exam Prep</span>
    </div>

    <div class="timer-widget">
      <button class="timer-btn" id="timer-start" onclick="toggleTimer()">▶ Start</button>
      <div class="timer-display" id="timer-display">00:00:00</div>
      <button class="timer-btn" onclick="resetTimer()">↻ Reset</button>
    </div>

    <div class="top-controls">
      <button class="calc-toggle" id="calc-toggle" onclick="toggleCalc()">
        🔢 Calculator
      </button>
      <button class="submit-btn" onclick="submitExam()">
        📊 Submit & Grade
      </button>
    </div>
  </header>

  <div class="main-area">
    <div class="content-area" id="content-area">
      <!-- Tab bar -->
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('pearson')" id="tab-pearson">
          Mock A — Pearson <span class="tab-badge" id="badge-pearson">0/38</span>
        </button>
        <button class="tab-btn" onclick="switchTab('revision')" id="tab-revision">
          Mock B — Revision <span class="tab-badge" id="badge-revision">0/7</span>
        </button>
      </div>

      <!-- Progress bar -->

// ══════════════════════════════════════════════════════
// TIMER

function formatTime(s) {
  const h = String(Math.floor(s/3600)).padStart(2,'0');
  const m = String(Math.floor((s%3600)/60)).padStart(2,'0');
  const sec = String(s%60).padStart(2,'0');
  return `${h}:${m}:${sec}`;
}

function toggleTimer() {
  const btn = document.getElementById('timer-start');
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    btn.textContent = '▶ Start';
    btn.classList.remove('active');
  } else {
    timerInterval = setInterval(() => {
      timerSeconds++;
      document.getElementById('timer-display').textContent = formatTime(timerSeconds);
    }, 1000);
    timerRunning = true;
    btn.textContent = '⏸ Pause';
    btn.classList.add('active');
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = 0;
  document.getElementById('timer-display').textContent = '00:00:00';
  const btn = document.getElementById('timer-start');
  btn.textContent = '▶ Start';
  btn.classList.remove('active');
}

// ══════════════════════════════════════════════════════
// RENDER QUESTIONS
// ══════════════════════════════════════════════════════
function renderQuestions() {
  const container = document.getElementById('questions-container');
  const questions = currentTab === 'pearson' ? pearsonQuestions : revisionQuestions;

  // Group by topic
  const groups = {};
  questions.forEach(q => {
    const topic = q.topic || q.type;
    if (!groups[topic]) groups[topic] = [];
    groups[topic].push(q);
  });

  let html = '';
  for (const [topicName, qs] of Object.entries(groups)) {
    html += `<div class="topic-group">
      <div class="topic-header">
        <div class="topic-dot"></div>
        <span class="topic-name">${topicName}</span>
        <span class="topic-count">${qs.length} questions</span>
      </div>
      <div class="questions-container">`;

    qs.forEach(q => {
      const hasAnswer = checkHasAnswer(q);
      html += `<div class="question-card ${examSubmitted ? (checkCorrect(q) ? 'answered' : 'incorrect') : (hasAnswer ? 'answered' : '')}" id="card-${q.id}">
        <div class="question-header">
          <span class="q-number">Q${q.num}</span>
          <span class="q-type">${q.type}</span>
          ${examSubmitted ? `<span class="q-status ${checkCorrect(q) ? 'correct' : 'incorrect'}">${checkCorrect(q) ? '✓ Correct' : '✗ Incorrect'}</span>` : ''}
        </div>
        <div class="question-text">${q.text}</div>`;

      // MC Options
      if (q.options) {
        html += `<div class="mc-options">`;
        q.options.forEach(opt => {
          const letter = opt.charAt(0);
          const isSelected = answers[q.id] === letter;
          let cls = isSelected ? 'selected' : '';
          if (examSubmitted) {
            if (letter === q.answer) cls += ' correct-answer';
            else if (isSelected && letter !== q.answer) cls += ' wrong-answer';
          }
          html += `<div class="mc-option ${cls}" onclick="selectMC('${q.id}','${letter}')">
            <div class="mc-radio"></div>
            <span>${opt}</span>
          </div>`;
        });
        html += `</div>`;
      }

      // Sub-questions
      if (q.subQuestions) {
        html += `<div class="sub-questions">`;
        q.subQuestions.forEach((sq, i) => {
          const key = `${q.id}_sub${i}`;
          const val = answers[key] || '';
          html += `<div class="sub-q">
            ${sq.label ? `<div class="sub-q-label">${sq.label}</div>` : ''}
            <div class="sub-q-text">${sq.text}</div>
            <input type="text" class="answer-input" placeholder="Your answer..."
              value="${val}" onchange="saveSubAnswer('${key}', this.value)"
              ${examSubmitted ? 'disabled' : ''}>
          </div>`;
        });
        html += `</div>`;
      }

      // Action buttons
      html += `<div class="action-row">
        <button class="show-answer-btn" onclick="toggleSolution('${q.id}')">
          💡 Show Solution
        </button>
        <button class="cheatsheet-toggle" onclick="toggleCheatsheet('${q.id}')">
          📋 Cheatsheet
        </button>
      </div>`;

      // Solution panel
      html += `<div class="solution-panel" id="sol-${q.id}">
        <div class="solution-title">💡 Solution</div>
        <div class="solution-content">${q.solution || ''}</div>
      </div>`;

      // Cheatsheet panel
      html += `<div class="cheatsheet-panel" id="cs-${q.id}">
        <div class="cheatsheet-title">📋 Cheatsheet Reference</div>
        <div class="cheatsheet-content">${q.cheatsheet || ''}</div>
      </div>`;

      html += `</div>`;
    });

    html += `</div></div>`;
  }

  container.innerHTML = html;
}

// ══════════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════════
function selectMC(qId, letter) {
  if (examSubmitted) return;
  answers[qId] = letter;
  renderQuestions();
  updateProgress();
}

function saveSubAnswer(key, value) {
  answers[key] = value;
  updateProgress();
}

function toggleSolution(qId) {
  const panel = document.getElementById('sol-' + qId);
  panel.classList.toggle('visible');
}

function toggleCheatsheet(qId) {
  const panel = document.getElementById('cs-' + qId);
  panel.classList.toggle('visible');
}

function checkHasAnswer(q) {
  if (q.options) return !!answers[q.id];
  if (q.subQuestions) return q.subQuestions.some((_, i) => answers[`${q.id}_sub${i}`]);
  return false;
}

function fuzzyMatch(userAns, correctAns) {
  if (!userAns) return false;
  const u = userAns.toString().toLowerCase().replace(/\s+/g, '').replace(/[,;]/g, '');
  const c = correctAns.toString().toLowerCase().replace(/\s+/g, '').replace(/[,;]/g, '');
  if (u === c) return true;
  if (c.includes(u) && u.length > 2) return true;
  const uNum = parseFloat(u);
  const cNum = parseFloat(c);
  if (!isNaN(uNum) && !isNaN(cNum) && Math.abs(uNum - cNum) < 0.02) return true;
  return false;
}

function checkCorrect(q) {
  if (q.options) {
    return answers[q.id] === q.answer;
  }
  if (q.subQuestions) {
    let correct = 0;
    q.subQuestions.forEach((sq, i) => {
      if (fuzzyMatch(answers[`${q.id}_sub${i}`], sq.answer)) correct++;
    });
    return correct >= Math.ceil(q.subQuestions.length / 2);
  }
  return false;
}

// ══════════════════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════════════════
function updateProgress() {
  const questions = currentTab === 'pearson' ? pearsonQuestions : revisionQuestions;
  const total = questions.length;
  let answered = 0;
  questions.forEach(q => { if (checkHasAnswer(q)) answered++; });

  document.getElementById('progress-text').textContent = `${answered} of ${total} answered`;
  const pct = total > 0 ? Math.round(answered / total * 100) : 0;
  document.getElementById('progress-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;

  // Update badges
  const pAns = pearsonQuestions.filter(q => checkHasAnswer(q)).length;
  const rAns = revisionQuestions.filter(q => checkHasAnswer(q)).length;
  document.getElementById('badge-pearson').textContent = `${pAns}/${pearsonQuestions.length}`;
  document.getElementById('badge-revision').textContent = `${rAns}/${revisionQuestions.length}`;
}

// ══════════════════════════════════════════════════════
// GRADING
// ══════════════════════════════════════════════════════
function submitExam() {
  if (examSubmitted) return;
  if (!confirm('Submit your exam for grading? You won\'t be able to change answers after this.')) return;
  examSubmitted = true;
  if (timerRunning) toggleTimer();

  const allQ = [...pearsonQuestions, ...revisionQuestions];
  let correct = 0;
  allQ.forEach(q => { if (checkCorrect(q)) correct++; });

  const total = allQ.length;
  const pct = Math.round(correct / total * 100);
  const grade20 = Math.round(correct / total * 20 * 10) / 10;

  // Topic breakdown
  const topicMap = {};
  allQ.forEach(q => {
    const t = q.topic || q.type;
    if (!topicMap[t]) topicMap[t] = { correct: 0, total: 0 };
    topicMap[t].total++;
    if (checkCorrect(q)) topicMap[t].correct++;
  });

  let gradeClass = 'grade-poor';
  let gradeLabel = 'Needs Work';
  if (grade20 >= 16) { gradeClass = 'grade-excellent'; gradeLabel = 'Excellent'; }
  else if (grade20 >= 12) { gradeClass = 'grade-good'; gradeLabel = 'Good'; }
  else if (grade20 >= 10) { gradeClass = 'grade-fair'; gradeLabel = 'Passable'; }

  let topicHTML = '';
  for (const [name, data] of Object.entries(topicMap)) {
    const pctTopic = Math.round(data.correct / data.total * 100);
    const color = pctTopic >= 80 ? 'var(--green)' : pctTopic >= 50 ? 'var(--accent)' : 'var(--red)';
    topicHTML += `<div class="topic-result-row">
      <span class="topic-result-name">${name}</span>
      <div class="topic-result-bar">
        <div class="topic-result-fill" style="width:${pctTopic}%; background:${color}"></div>
      </div>
      <span class="topic-result-score">${data.correct}/${data.total}</span>
    </div>`;
  }

  document.getElementById('results-card').innerHTML = `
    <div class="results-header">
      <div class="results-score">${grade20}/20</div>
      <div class="results-subtitle">${correct} correct out of ${total} questions · ${pct}%</div>
      <div class="results-grade ${gradeClass}">${gradeLabel}</div>
    </div>
    <div class="results-stats">
      <div class="stat-box">
        <div class="stat-value">${correct}</div>
        <div class="stat-label">Correct</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${total - correct}</div>
        <div class="stat-label">Incorrect</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${formatTime(timerSeconds)}</div>
        <div class="stat-label">Time</div>
      </div>
    </div>
    <div class="topic-results">
      <div style="font-weight:700;font-size:0.82rem;margin-bottom:10px;color:var(--text-primary)">Performance by Topic</div>
      ${topicHTML}
    </div>
    <button class="results-close-btn" onclick="closeResults()">Review Answers</button>
  `;

  document.getElementById('results-overlay').classList.add('visible');
  renderQuestions();
}

function closeResults() {
  document.getElementById('results-overlay').classList.remove('visible');
}
